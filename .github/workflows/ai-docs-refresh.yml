name: AI Docs Refresh (Daily)

on:
  schedule:
    # Daily at 01:15 UTC
    - cron: '15 1 * * *'
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ai-docs-refresh
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate AI docs indexes
        run: pnpm run ai:generate-all

      - name: Validate AI docs artifacts
        run: pnpm run ai:docs:validate

      - name: Create or update PR
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/ai-docs-refresh
          base: dev
          title: 'chore(ai-docs): refresh indexes'
          commit-message: 'chore(ai-docs): refresh indexes'
          body: |
            Automated daily refresh of AI docs artifacts.

            - Regenerated: `.ai-docs/indexes/*`
            - Commands:
              - `pnpm run ai:generate-all`
              - `pnpm run ai:docs:validate`
          labels: |
            automation
            ai-docs
          delete-branch: false
          add-paths: |
            .ai-docs/indexes/**
            .ai-docs/quick-reference/**
            .ai-docs/schemas/**
            .ai-docs/BOOTSTRAP.md
