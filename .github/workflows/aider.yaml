name: Aider Agent

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: aider-${{ github.repository }}-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  aider:
    if: >
      github.event.issue.state == 'open' &&
      github.event.sender.type != 'Bot' &&
      contains(github.event.comment.body, '@aider')
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "aider-bot"
          git config user.email "aider-bot@users.noreply.github.com"

      - name: Create working branch
        run: |
          BRANCH="aider/issue-${{ github.event.issue.number }}"
          git checkout -B "$BRANCH"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Aider
        run: |
          python -m pip install --upgrade pip
          pip install aider-chat

      - name: Append text to file (if provided)
        id: append
        env:
          RAW_COMMENT: ${{ github.event.comment.body }}
        run: |
          set -euo pipefail

          python - <<'PY'
          import os, re, sys, subprocess, pathlib

          raw = os.environ.get("RAW_COMMENT", "")
          raw2 = re.sub(r'(?i)\s*@aider\s*', ' ', raw, count=1).strip()

          out = os.environ.get("GITHUB_OUTPUT")
          if out:
            with open(out, "a", encoding="utf-8") as o:
              o.write("applied=0\n")

          m = re.search(r'(?im)^\s*APPEND_FILE\s*:\s*(.+)\s*$', raw2)
          if not m:
            print("No APPEND_FILE provided.")
            sys.exit(0)

          file_path = m.group(1).strip()

          # Safety: reject absolute paths and paths containing ..
          p = pathlib.Path(file_path)
          if p.is_absolute() or ".." in p.parts:
            print(f"Unsafe path: {file_path}", file=sys.stderr)
            sys.exit(3)

          if not p.exists():
            print(f"File not found: {file_path}", file=sys.stderr)
            sys.exit(4)

          # Parse TEXT section
          text_match = re.search(r'(?im)^\s*TEXT\s*:\s*(.*)$', raw2, re.DOTALL)
          if not text_match:
            print("No TEXT section provided.", file=sys.stderr)
            sys.exit(2)

          text_content = text_match.group(1).strip()

          # Handle fenced blocks like ```md ... ```
          fence = re.search(r'(?is)```(?:md)?\s*(.*?)\s*```', text_content)
          if fence:
            text_content = fence.group(1).strip()

          if not text_content:
            print("TEXT section is empty.", file=sys.stderr)
            sys.exit(2)

          # Read existing file content
          with open(file_path, "r", encoding="utf-8") as f:
            existing_content = f.read()

          # Check if text already exists
          if text_content in existing_content:
            print("Text already exists in file, no changes made.")
            sys.exit(0)

          # Append text to file
          with open(file_path, "a", encoding="utf-8") as f:
            f.write("\n\n" + text_content + "\n")

          # Stage and commit
          subprocess.check_call(["git", "add", "-A"])
          r = subprocess.run(["git", "diff", "--cached", "--quiet"])
          if r.returncode == 0:
            print("Text appended but produced no staged changes.")
            sys.exit(0)

          subprocess.check_call(["git", "commit", "-m", f"docs: append text to {file_path}"])

          if out:
            with open(out, "a", encoding="utf-8") as o:
              o.write("applied=1\n")

          print("Text appended and committed.")
          PY

      - name: Apply PATCH from comment (if provided)
        id: patch
        if: steps.append.outputs.applied != '1'
        env:
          RAW_COMMENT: ${{ github.event.comment.body }}
        run: |
          set -euo pipefail

          python - <<'PY'
          import os, re, sys, subprocess, tempfile, pathlib

          raw = os.environ.get("RAW_COMMENT","")
          raw2 = re.sub(r'(?i)\s*@aider\s*', ' ', raw, count=1).strip()

          out = os.environ.get("GITHUB_OUTPUT")
          if out:
            with open(out, "a", encoding="utf-8") as o:
              o.write("applied=0\n")

          m = re.search(r'(?is)^\s*PATCH\s*:\s*(.+)$', raw2)
          if not m:
            print("No PATCH provided.")
            sys.exit(0)

          patch_text = m.group(1).strip()

          # Allow fenced ```diff ... ```
          fence = re.search(r'(?is)```(?:diff)?\s*(.*?)\s*```', patch_text)
          if fence:
            patch_text = fence.group(1).strip()

          if not patch_text:
            print("PATCH section is empty.", file=sys.stderr)
            sys.exit(2)

          with tempfile.NamedTemporaryFile("w", delete=False, encoding="utf-8") as f:
            f.write(patch_text + "\n")
            patch_file = f.name

          # Validate + apply
          subprocess.check_call(["git","apply","--check",patch_file])
          subprocess.check_call(["git","apply",patch_file])

          # Stage + commit only if there are changes
          subprocess.check_call(["git","add","-A"])
          r = subprocess.run(["git","diff","--cached","--quiet"])
          if r.returncode == 0:
            print("PATCH applied but produced no staged changes.")
            sys.exit(0)

          subprocess.check_call(["git","commit","-m","chore: apply patch from issue comment"])

          if out:
            with open(out, "a", encoding="utf-8") as o:
              o.write("applied=1\n")

          print("PATCH applied and committed.")
          PY

      - name: Run Aider (FILES/TASK) if no PATCH
        if: steps.append.outputs.applied != '1' && steps.patch.outputs.applied != '1'
        env:
          OPENAI_API_KEY: ${{ secrets.AI_KEY }}
          OPENAI_API_BASE: ${{ secrets.AI_BASE_URL }}
          AIDER_MODEL: minimax/MiniMax-M2.1
          RAW_COMMENT: ${{ github.event.comment.body }}
        run: |
          set -euo pipefail

          python - <<'PY'
          import os, re, shlex, subprocess, sys, pathlib

          raw = os.environ.get("RAW_COMMENT", "")
          raw2 = re.sub(r'(?i)\s*@aider\s*', ' ', raw, count=1).strip()

          # If user provided PATCH, we would have skipped this step already.
          # Now require FILES:
          m = re.search(r'(?im)^\s*FILES\s*:\s*(.+)\s*$', raw2)
          if not m:
            print(
              "Missing FILES line.\n\nExample:\n"
              "@aider\nFILES: README.md docs/setup.md\nTASK: Describe the change clearly.\n\n"
              "Alternative:\n@aider\nPATCH:\n```diff\n...diff here...\n```",
              file=sys.stderr
            )
            sys.exit(2)

          files = [f.strip() for f in re.split(r'[,\s]+', m.group(1)) if f.strip()]

          safe = []
          for f in files:
            p = pathlib.Path(f)
            if p.is_absolute() or ".." in p.parts:
              print(f"Unsafe path: {f}", file=sys.stderr)
              sys.exit(3)
            if not p.exists():
              print(f"File not found: {f}", file=sys.stderr)
              sys.exit(4)
            safe.append(f)

          if not safe:
            print("No valid files provided after FILES.", file=sys.stderr)
            sys.exit(5)

          task = re.sub(r'(?im)^\s*FILES\s*:\s*.+\s*$', '', raw2).strip()
          if not task:
            print("No TASK provided after FILES.", file=sys.stderr)
            sys.exit(6)

          cmd = [
            "aider",
            "--yes",
            "--model", os.environ["AIDER_MODEL"],
            *safe,
            "--message", task
          ]

          print("Running:", " ".join(shlex.quote(x) for x in cmd))
          subprocess.check_call(cmd)
          PY

      - name: Push branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          BRANCH="aider/issue-${{ github.event.issue.number }}"
          git push -u origin "$BRANCH" --force-with-lease

      - name: Check if branch has commits ahead of base
        id: changes
        run: |
          set -euo pipefail
          BASE="${{ github.event.repository.default_branch }}"
          git fetch origin "$BASE" --depth=1
          AHEAD="$(git rev-list --count "origin/$BASE..HEAD")"
          echo "ahead=$AHEAD" >> "$GITHUB_OUTPUT"

      - name: Comment on issue if no commits
        if: steps.changes.outputs.ahead == '0'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_TOKEN }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: "No commits were produced. Use one of these formats:\n\n" +
                    "1. Append text (simplest):\n" +
                    "@aider\n" +
                    "APPEND_FILE: README.md\n" +
                    "TEXT:\n" +
                    "```md\n" +
                    "Your text here\n" +
                    "```\n\n" +
                    "2. Apply a patch:\n" +
                    "@aider\n" +
                    "PATCH:\n" +
                    "```diff\n" +
                    "...diff here...\n" +
                    "```\n\n" +
                    "3. Use Aider (requires FILES + TASK):\n" +
                    "@aider\n" +
                    "FILES: path/to/file\n" +
                    "TASK: clear instructions"
            });

      - name: Create PR
        if: steps.changes.outputs.ahead != '0'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue = context.payload.issue.number;
            const head = `aider/issue-${issue}`;
            const base = context.payload.repository.default_branch;

            const prs = await github.rest.pulls.list({
              owner,
              repo,
              head: `${owner}:${head}`,
              state: "open"
            });

            if (prs.data.length === 0) {
              const pr = await github.rest.pulls.create({
                owner,
                repo,
                head,
                base,
                title: `Aider: fix for issue #${issue}`,
                body: `Automated changes by Aider for #${issue}`,
                draft: false
              });

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issue,
                body: `PR opened: #${pr.data.number}`
              });
            }
