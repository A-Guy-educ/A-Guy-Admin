name: Dependency Security Report (Daily)

on:
  schedule:
    # Daily at 02:25 UTC
    - cron: '25 2 * * *'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: deps-security-report
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate dependency security report
        run: pnpm run deps:security:report

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: deps-security-report
          path: .ai-docs/reports/deps-security-report.md
          if-no-files-found: error
