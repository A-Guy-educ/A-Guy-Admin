name: Doc Link Fixer (Daily)

on:
  schedule:
    - cron: '5 2 * * *'
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: doc-link-fixer
  cancel-in-progress: true

jobs:
  fix-links:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fix internal markdown links + write report
        run: pnpm run docs:links:fix

      - name: Upsert issue on failure (broken links remain)
        if: always()
        run: |
          if [ -f ".ai-docs/reports/doc-link-report.md" ]; then
            pnpm tsx scripts/github-issue-upsert.ts \
              --title "Doc link fixer failures (automated)" \
              --body-file ".ai-docs/reports/doc-link-report.md" \
              --labels "automation,docs,doc-links" \
              --dedupe-label "doc-links" \
              --mode upsert
          else
            echo "No failure report found. Skipping issue upsert."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create or update PR
        if: always()
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/doc-link-fixer
          base: dev
          title: 'chore(docs): fix broken internal links'
          commit-message: 'chore(docs): fix broken internal links'
          body: |
            Automated daily internal markdown link fixer.

            - Fixes safe patterns (e.g. docs/ai -> .ai-docs, repo-root paths, missing .md where unambiguous)
            - Failure report (only if broken remain): .ai-docs/reports/doc-link-report.md

            Run locally:
            - pnpm run docs:links:fix
          labels: |
            automation
            docs
          delete-branch: false
          add-paths: |
            **/*.md
            .ai-docs/reports/doc-link-report.md
