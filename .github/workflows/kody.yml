# Drop this file at .github/workflows/kody.yml in your repo.
#
# Triggers forward every relevant event to `kody`; the engine decides what
# (if anything) to do. The job runs `npx kody-engine` — no shell branching, no
# routing logic in YAML. All orchestration lives in the kody npm package;
# future capabilities ship via `npm publish`, not by editing this file.
#
# Required repo secrets: at least one model provider key (e.g. MINIMAX_API_KEY,
# ANTHROPIC_API_KEY). kody reads any *_API_KEY secret automatically via
# toJSON(secrets) — no need to list them here.
#
# Auth: when KODY_APP_ID + KODY_APP_PRIVATE_KEY exist, mint a fresh GitHub App
# installation token. Otherwise fall back to the default GITHUB_TOKEN so the
# workflow can still run in repos that have not configured the App yet.
# Set KODY_APP_ID + KODY_APP_PRIVATE_KEY in repo Settings → Secrets → Actions.
# (Install the App on the org first; it auto-resolves the installation.)

name: kody

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'GitHub issue number (agent mode)'
        type: string
        default: ''
      sessionId:
        description: 'Chat session ID (chat mode, from Kody-Dashboard)'
        type: string
        default: ''
      message:
        description: 'Initial chat message (optional)'
        type: string
        default: ''
      model:
        description: 'Model override (optional, e.g. anthropic/claude-haiku-4-5-20251001)'
        type: string
        default: ''
      dashboardUrl:
        description: 'Dashboard event ingest URL with inline ?token=... (chat mode)'
        type: string
        default: ''
      capability:
        description: 'Capability action to run for issue_number (default: run). goal-tick sets classify.'
        type: string
        default: ''
      base:
        description: 'Stacked-PR base branch for issue_number (goal-tick stacked dispatch).'
        type: string
        default: ''
  issue_comment:
    types: [created]
  pull_request:
    # opened + synchronize → rebuild the per-PR preview on every push
    # (kody routes these to onPullRequest="preview-build"). closed stays for
    # the release-merge path (kody ignores it; release self-manages).
    types: [opened, synchronize, closed]
  schedule:
    # Wakes every 30 minutes; kody fans out to whichever scheduled executables
    # (mission-scheduler, memorize, watch-stale-prs, …) match this tick.
    #
    # `memorize` writes to `.kody/vault/` and opens a daily PR. If your
    # `.gitignore` ignores `.kody/*`, add `!.kody/vault/` and `!.kody/vault/**`
    # so memorize's pages are tracked.
    - cron: '*/15 * * * *'

jobs:
  run:
    if: ${{ github.event_name != 'pull_request' || github.event.action == 'opened' || github.event.action == 'synchronize' || github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      HAS_KODY_APP_TOKEN: ${{ secrets.KODY_APP_ID != '' && secrets.KODY_APP_PRIVATE_KEY != '' }}
      SHOULD_RUN_KODY_ENGINE: ${{ github.event_name != 'pull_request' || secrets.KODY_MASTER_KEY != '' }}
    concurrency:
      group: kody-${{ inputs.sessionId || inputs.issue_number || github.event.issue.number || github.sha }}
      cancel-in-progress: false
    permissions:
      issues: write
      pull-requests: write
      contents: write
      actions: read
      id-token: write # OIDC: Namespace remote builder
    steps:
      - name: Skip Kody preview build
        if: env.SHOULD_RUN_KODY_ENGINE != 'true'
        run: echo "KODY_MASTER_KEY is not configured; skipping Kody preview build for this pull request."

      - name: Mint GitHub App token
        if: env.SHOULD_RUN_KODY_ENGINE == 'true' && env.HAS_KODY_APP_TOKEN == 'true'
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.KODY_APP_ID }}
          private-key: ${{ secrets.KODY_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - uses: actions/checkout@v4
        if: env.SHOULD_RUN_KODY_ENGINE == 'true'
        with:
          fetch-depth: 0
          # On opened/synchronize, build the PR HEAD so the preview reflects
          # the branch changes; otherwise (merge/release) the base ref.
          ref: ${{ (github.event.action == 'opened' || github.event.action == 'synchronize') && github.event.pull_request.head.sha || github.event.pull_request.base.ref || github.ref }}
          token: ${{ steps.app-token.outputs.token || github.token }}

      - uses: actions/setup-node@v4
        if: env.SHOULD_RUN_KODY_ENGINE == 'true'
        with:
          node-version: 22

      - name: Write pip cache key for LiteLLM
        if: env.SHOULD_RUN_KODY_ENGINE == 'true'
        run: |
          echo "litellm[proxy]" > .kody-pip-requirements.txt
          mkdir -p ~/.cache/pip

      - uses: actions/setup-python@v5
        if: env.SHOULD_RUN_KODY_ENGINE == 'true'
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: .kody-pip-requirements.txt

      - name: Run Kody engine
        if: env.SHOULD_RUN_KODY_ENGINE == 'true'
        continue-on-error: ${{ github.event_name == 'pull_request' && github.event.action != 'closed' }}
        env:
          ALL_SECRETS: ${{ toJSON(secrets) }}
          # The App token wins: set explicitly so it beats any leftover
          # KODY_TOKEN unpacked from ALL_SECRETS (the engine's resolver skips
          # env keys that are already set).
          KODY_TOKEN: ${{ steps.app-token.outputs.token || secrets.KODY_TOKEN || secrets.github_token || github.token }}
          SESSION_ID: ${{ inputs.sessionId }}
          INIT_MESSAGE: ${{ inputs.message }}
          MODEL: ${{ inputs.model }}
          DASHBOARD_URL: ${{ inputs.dashboardUrl }}
        run: npx -y -p @kody-ade/kody-engine@latest kody-engine
