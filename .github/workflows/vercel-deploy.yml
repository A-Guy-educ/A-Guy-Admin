name: Build & Deploy to Vercel

on:
  push:
    branches: [main, dev]
    paths:
      - 'src/**'
      - 'public/**'
      - 'payload.config.*'
      - 'next.config.*'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'tsconfig.json'
      - 'vercel.json'
      - '.github/workflows/vercel-deploy.yml'

  workflow_dispatch:

concurrency:
  group: vercel-deploy-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy ${{ github.ref_name == 'main' && 'Production' || 'Preview' }}
    if: github.ref_name == 'main' || github.ref_name == 'dev'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NODE_OPTIONS: --max-old-space-size=4096
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: pnpm add -g vercel

      - name: Pull Vercel Preview Settings
        if: github.ref_name == 'dev'
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_ACCESS_TOKEN }}

      - name: Build Preview
        if: github.ref_name == 'dev'
        run: vercel build --token=${{ secrets.VERCEL_ACCESS_TOKEN }}

      - name: Deploy Preview
        if: github.ref_name == 'dev'
        run: >
          vercel deploy --prebuilt --token=${{ secrets.VERCEL_ACCESS_TOKEN }}
          -m githubDeployment=1
          -m githubCommitRef=${{ github.ref_name }}
          -m githubCommitSha=${{ github.sha }}
          -m githubCommitOrg=${{ github.repository_owner }}
          -m githubCommitRepo=${{ github.event.repository.name }}
          -m githubOrg=${{ github.repository_owner }}
          -m githubRepo=${{ github.event.repository.name }}

      - name: Pull Vercel Production Settings
        if: github.ref_name == 'main'
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_ACCESS_TOKEN }}

      - name: Build Production
        if: github.ref_name == 'main'
        run: vercel build --prod --token=${{ secrets.VERCEL_ACCESS_TOKEN }}

      - name: Deploy Production
        if: github.ref_name == 'main'
        run: >
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_ACCESS_TOKEN }}
          -m githubDeployment=1
          -m githubCommitRef=${{ github.ref_name }}
          -m githubCommitSha=${{ github.sha }}
          -m githubCommitOrg=${{ github.repository_owner }}
          -m githubCommitRepo=${{ github.event.repository.name }}
          -m githubOrg=${{ github.repository_owner }}
          -m githubRepo=${{ github.event.repository.name }}
